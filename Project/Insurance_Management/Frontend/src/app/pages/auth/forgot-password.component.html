<div class="auth-page">
  <div class="auth-card glass-panel animated-enter">
    <div class="auth-logo">🔐</div>
    <h2 class="header-text auth-title">Reset Password</h2>

    <div *ngIf="step === 1">
      <p class="sub-text auth-sub">Enter your email to receive an OTP.</p>
      <form (ngSubmit)="requestOtp()" #emailForm="ngForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" [(ngModel)]="email" name="email" required placeholder="john@example.com">
        </div>
        <div *ngIf="errorMsg" class="error-msg">{{ errorMsg }}</div>
        <button type="submit" class="btn-primary btn-full" [disabled]="!emailForm.valid || isLoading">{{ isLoading ? 'Sending...' : 'Send OTP' }}</button>
      </form>
    </div>

    <div *ngIf="step === 2" class="animated-enter">
      <p class="sub-text auth-sub">An OTP has been sent to <strong>{{email}}</strong>.</p>
      <form (ngSubmit)="resetPassword()" #resetForm="ngForm">
        <div class="form-group">
          <label class="form-label">Enter 6-digit OTP</label>
          <input type="text" class="form-control otp-input" [(ngModel)]="otp" name="otp" required minlength="6" maxlength="6">
        </div>
        <div class="form-group">
          <label class="form-label">New Password</label>
          <div class="input-wrap">
            <input [type]="showPassword ? 'text' : 'password'" class="form-control" [(ngModel)]="newPassword" name="newPassword" required minlength="8" placeholder="••••••••" style="padding-right:2.5rem;">
            <button type="button" class="eye-btn" (click)="showPassword = !showPassword">{{ showPassword ? '👁️' : '🙈' }}</button>
          </div>
        </div>
        <div *ngIf="successMsg" class="success-msg">{{ successMsg }}</div>
        <div *ngIf="errorMsg" class="error-msg">{{ errorMsg }}</div>
        <button type="submit" class="btn-primary btn-full" [disabled]="!resetForm.valid || isLoading">{{ isLoading ? 'Resetting...' : 'Reset Password' }}</button>
      </form>
    </div>

    <div class="auth-footer">
      <a class="link" (click)="navigateToLogin()">← Back to Login</a>
    </div>
  </div>
</div>
