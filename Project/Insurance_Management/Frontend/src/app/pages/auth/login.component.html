<div class="auth-page">
  <div class="auth-card glass-panel animated-enter">
    <div class="auth-logo">🛡️</div>
    <h2 class="header-text auth-title">Welcome Back</h2>
    <p class="sub-text auth-sub">Sign in to your SecureLife account</p>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" [(ngModel)]="credentials.email" name="email" required placeholder="john@example.com">
      </div>
      <div class="form-group">
        <label class="form-label label-row">
          Password
          <a class="link-sm" (click)="navigateToForgotPassword()">Forgot Password?</a>
        </label>
        <div class="input-wrap">
          <input [type]="showPassword ? 'text' : 'password'" class="form-control" [(ngModel)]="credentials.password" name="password" required placeholder="••••••••" style="padding-right:2.5rem;">
          <button type="button" class="eye-btn" (click)="showPassword = !showPassword">{{ showPassword ? '👁️' : '🙈' }}</button>
        </div>
      </div>
      <div *ngIf="errorMsg" class="error-msg">{{ errorMsg }}</div>
      <button type="submit" class="btn-primary btn-full" [disabled]="!loginForm.valid">Sign In</button>
    </form>

    <div class="auth-footer">
      <span class="sub-text">Don't have an account? </span>
      <a class="link" (click)="navigateToRegister()">Create one</a>
    </div>
  </div>
</div>
