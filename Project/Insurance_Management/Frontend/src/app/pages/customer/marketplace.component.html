<nav style="background: white; padding: 1rem 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
      <h1 class="header-text" style="font-size: 1.5rem; margin: 0; color: var(--primary);">Insurance Marketplace</h1>
      <div>
        <button class="btn-secondary" style="margin-right: 1rem;" (click)="goBack()">Back to Dashboard</button>
      </div>
    </nav>

    <div class="page-container animated-enter">
      <h2 class="header-text">Available Plans</h2>
      <p class="sub-text" style="margin-bottom: 2rem;">Browse our premium insurance products securely.</p>

      <div *ngIf="policies.length === 0" class="sub-text">
        No active insurance products found in the catalog.
      </div>

      <div class="grid-cards">
        <div *ngFor="let p of policies" class="glass-panel" style="display: flex; flex-direction: column; justify-content: space-between;">
          <div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
               <h3 class="header-text" style="font-size: 1.25rem;">{{ p.name }}</h3>
               <span class="badge badge-success">{{ p.type }}</span>
            </div>
            
            <p class="sub-text" style="font-size: 0.875rem; margin-bottom: 1rem; flex-grow: 1;">
              <strong>Coverage:</strong> {{ p.coverage }}<br><br>
              <strong>Terms:</strong> {{ p.terms }}
            </p>
          </div>
          
          <div>
            <hr style="border: 0; border-top: 1px solid var(--border); margin: 1rem 0;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
               <span style="font-size: 1.25rem; font-weight: 700; color: var(--text-main);">$ {{ p.premium }}/mo</span>
               <button class="btn-primary" (click)="buyPolicy(p)">Purchase Plan</button>
            </div>
          </div>
        </div>
      </div>
    </div>
